name: Shell Lint

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck shfmt

      - name: Reviewdog ShellCheck (PR annotations)
        if: ${{ github.event_name == 'pull_request' }}
        uses: reviewdog/action-shellcheck@4410ae3f82f068bdb0234069a9bf2367923fb39a # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          filter_mode: diff_context
          shellcheck_flags: -S warning

      - name: ShellCheck (collect warnings)
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Collect warnings (do not fail the job)
          if ! find . -type f -name "*.sh" -not -path "./.git/*" -print0 | xargs -0 -r shellcheck -S warning | tee artifacts/shellcheck-warnings.txt; then
            echo "has_warnings=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_warnings=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload ShellCheck warnings
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        if: always()
        with:
          name: shellcheck-warnings
          path: artifacts/shellcheck-warnings.txt

      - name: ShellCheck (errors only)
        run: |
          set -euo pipefail
          # Fail only on errors
          find . -type f -name "*.sh" -not -path "./.git/*" -print0 | xargs -0 -r shellcheck -S error

      - name: shfmt (diff-only)
        run: |
          set -euo pipefail
          # Check formatting with 2-space indent, simplify, and case indent
          shfmt -d -i 2 -ci -s .
